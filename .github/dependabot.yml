version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      ESLint:
        patterns:
          - eslint
          - "@typescript-eslint/*"
          - "@eslint/*"
          - typescript-eslint
      Rollup:
        patterns:
          - rollup
          - "@rollup/*"
      Jest:
        patterns:
          - jest
          - "@types/jest"
          - ts-jest
  - package-ecosystem: "npm"
    directory: "/vsts-variable-set/v1"
    schedule:
      interval: "weekly"
    ignore:
    - dependency-name: "azure-pipelines-task-lib"
      update-types: ["version-update:semver-major"]
  - package-ecosystem: "npm"
    directory: "/vsts-variable-set/v2"
    schedule:
      interval: "weekly"
    ignore:
    - dependency-name: "azure-pipelines-task-lib"
      update-types: ["version-update:semver-major"]
  - package-ecosystem: "npm"
    directory: "/vsts-variable-set/v3"
    schedule:
      interval: "weekly"
    ignore:
    - dependency-name: "azure-pipelines-task-lib"
      update-types: ["version-update:semver-major"]
  - package-ecosystem: "npm"
    directory: "/vsts-variable-transform/v1"
    schedule:
      interval: "weekly"
    ignore:
    - dependency-name: "azure-pipelines-task-lib"
      update-types: ["version-update:semver-major"]
  - package-ecosystem: "npm"
    directory: "/vsts-variable-transform/v2"
    schedule:
      interval: "weekly"
    ignore:
    - dependency-name: "azure-pipelines-task-lib"
      update-types: ["version-update:semver-major"]
  - package-ecosystem: "npm"
    directory: "/vsts-variable-transform/v3"
    schedule:
      interval: "weekly"
    ignore:
    - dependency-name: "azure-pipelines-task-lib"
      update-types: ["version-update:semver-major"]
