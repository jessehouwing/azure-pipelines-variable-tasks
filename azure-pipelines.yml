name: '3.0$(rev:.r)'

trigger:
- main
- features/*

pr:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - name: 'extensionId'
    value: 'jessehouwing-vsts-variable-tasks'
  - name: 'tfxVersion'
    value: 'builtin'

strategy:
  matrix:
    Node20_Ubuntu:
      nodeVersion: '20.x'
      vmImage: 'ubuntu-latest'
    Node24_Ubuntu:
      nodeVersion: '24.x'
      vmImage: 'ubuntu-latest'
    Node20_Windows:
      nodeVersion: '20.x'
      vmImage: 'windows-latest'
    Node24_Windows:
      nodeVersion: '24.x'
      vmImage: 'windows-latest'

stages:
- stage: 'Build'
  displayName: 'Build'
  jobs:
  - job: 
    displayName: 'Build and Test'
    pool:
      vmImage: $(vmImage)
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: $(nodeVersion)
      displayName: 'Install Node.js $(nodeVersion)'

    - script: npm install --legacy-peer-deps
      displayName: 'Install dependencies'

    - script: npm run build
      displayName: 'Build'

    - script: npm run lint
      displayName: 'Lint'

    - pwsh: |
        npm run test
      displayName: 'Run Jest tests'

    - pwsh: |
        Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser
        Invoke-Pester -Path './vsts-variable-*' -Output Detailed -CI
      displayName: 'Run Pester tests'

    - task: replacetokens@7
      inputs:
        sources: '**/task.json'
        encoding: 'utf-8'
        tokenPattern: 'default'
        addBOM: false
      condition: and(succeeded(), eq(variables['nodeVersion'], '24.x'), eq(variables['vmImage'], 'windows-latest'))

    - task: TfxInstaller@5
      displayName: 'Use Node CLI for Azure DevOps'
      inputs:
        version: $(tfxVersion)
        checkLatest: true
      condition: and(succeeded(), eq(variables['nodeVersion'], '24.x'), eq(variables['vmImage'], 'windows-latest'))

    - task: PackageAzureDevOpsExtension@5
      displayName: 'Package Extension: $(Build.SourcesDirectory)'
      name: 'packageStep'
      inputs:
        rootFolder: '$(Build.SourcesDirectory)'
        outputPath: '$(Build.ArtifactStagingDirectory)\$(extensionId).vsix'
        publisherId: 'jessehouwing'
        extensionId: $(extensionId)
        extensionTag: '-build'
        extensionName: 'Variable Toolbox'
        extensionVersion: '$(Build.BuildNumber)'
        updateTasksVersion: true
        updateTasksVersionType: patch
        extensionVisibility: private
      condition: and(succeeded(), eq(variables['nodeVersion'], '24.x'), eq(variables['vmImage'], 'windows-latest'))

    - task: PublishPipelineArtifact@1
      displayName: 'Publish vsix'
      inputs:
        publishLocation: pipeline
        targetPath: '$(packageStep.Extension.OutputPath)'
        artifact: 'vsix'
      condition: and(succeededOrFailed(), eq(variables['nodeVersion'], '24.x'), eq(variables['vmImage'], 'windows-latest'))

- stage: PublishDev
  displayName: 'Publish privately'
  condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
  dependsOn: 'Build'
  jobs:
    - deployment: 
      environment: Publisher JesseHouwing (privately)
      strategy: 
        runOnce:
         deploy:
          steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '24.x'
            displayName: 'Install Node.js'

          - task: TfxInstaller@5
            displayName: 'Use Node CLI for Azure DevOps'
            inputs:
              version: $(tfxVersion)
              checkLatest: true

          - task: PublishAzureDevOpsExtension@5
            name: 'publishDev'
            inputs:
              connectTo: 'AzureRM'
              connectedServiceNameAzureRM: 'azure-devops-marketplace'
              fileType: 'vsix'
              vsixFile: '$(Pipeline.Workspace)/vsix/$(extensionId).vsix'
              publisherId: 'jessehouwing'
              extensionId: '$(extensionId)'
              extensionTag: '-dev'
              updateTasksVersion: false
              extensionVisibility: 'privatepreview'
              shareWith: 'jessehouwing-dev'
              noWaitValidation: true
        
          - task: IsAzureDevOpsExtensionValid@5
            inputs:
              connectTo: 'AzureRM'
              connectedServiceNameAzureRM: 'azure-devops-marketplace'
              method: 'vsix'
              vsixFile: '$(publishDev.Extension.OutputPath)'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish vsix'
            inputs:
              publishLocation: pipeline
              targetPath: '$(publishDev.Extension.OutputPath)'
              artifact: 'dev'
            condition: succeededOrFailed()

- stage: PublishProd
  displayName: 'Publish publicly'
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  dependsOn: 'PublishDev'
  jobs:
    - deployment: 
      environment: Publisher JesseHouwing (publicly)
      strategy: 
        runOnce:
         deploy:
          steps:

          - task: NodeTool@0
            inputs:
              versionSpec: '24.x'
            displayName: 'Install Node.js'
            
          - task: TfxInstaller@5
            displayName: 'Use Node CLI for Azure DevOps'
            inputs:
              version: $(tfxVersion)
              checkLatest: true

          - task: PublishAzureDevOpsExtension@5
            name: 'publishProd'
            inputs:
              connectTo: 'AzureRM'
              connectedServiceNameAzureRM: 'azure-devops-marketplace'
              fileType: 'vsix'
              vsixFile: '$(Pipeline.Workspace)/vsix/$(extensionId).vsix'
              publisherId: 'jessehouwing'
              extensionId: $(extensionId)
              updateTasksVersion: false
              extensionVisibility: 'public'
              noWaitValidation: true
          
          - task: IsAzureDevOpsExtensionValid@5
            inputs:
              connectTo: 'AzureRM'
              connectedServiceNameAzureRM: 'azure-devops-marketplace'
              method: 'vsix'
              vsixFile: '$(publishProd.Extension.OutputPath)'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish vsix'
            inputs:
              publishLocation: pipeline
              targetPath: '$(publishProd.Extension.OutputPath)'
              artifact: 'prod'
            condition: succeededOrFailed()

          - task: GitHubRelease@1
            inputs:
              gitHubConnection: 'GitHub - jessehouwing'
              repositoryName: '$(Build.Repository.Name)'
              action: 'create'
              target: '$(Build.SourceVersion)'
              tagSource: 'userSpecifiedTag'
              tag: 'v$(Build.BuildNumber)'
              title: 'v$(Build.BuildNumber)'
              releaseNotesSource: 'inline'
              assets: |
                $(publishProd.Extension.OutputPath)*
              changeLogCompareToRelease: 'lastFullRelease'
              changeLogType: 'issueBased'
              changeLogLabels: '[{ "state" : "closed" }]'
